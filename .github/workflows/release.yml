name: Release

# Chaque push sur main publie automatiquement une nouvelle release et met à
# jour l'appcast Sparkle (ce qui déclenche la mise à jour des apps installées).
# La version est auto-incrémentée (patch) à partir du dernier tag `v*`.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Évite les exécutions concurrentes : un seul release-train à la fois (sinon
# deux runs pourraient calculer le même numéro de version / se marcher dessus).
concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout (avec tags)
        uses: actions/checkout@v4
        with:
          # Historique complet + tags nécessaires au calcul de version.
          fetch-depth: 0
          fetch-tags: true

      - name: Calculer la prochaine version (patch +1)
        id: version
        run: |
          LATEST="$(git tag -l 'v*' --sort=-v:refname | head -1)"
          if [ -z "$LATEST" ]; then
            NEXT="1.0.1"
          else
            VER="${LATEST#v}"
            MAJOR="${VER%%.*}"
            REST="${VER#*.}"
            MINOR="${REST%%.*}"
            PATCH="${REST#*.}"
            # Garde-fous si un composant manque (ex. tag "v1" ou "v1.2").
            MAJOR="${MAJOR:-1}"; MINOR="${MINOR:-0}"; PATCH="${PATCH:-0}"
            PATCH=$((PATCH + 1))
            NEXT="${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "Dernier tag: ${LATEST:-<aucun>} → nouvelle version: ${NEXT}"
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"

      - name: Importer le certificat de code-signing (permission Accessibilité stable)
        env:
          CERT_P12_BASE64: ${{ secrets.SIGNING_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if [ -z "${CERT_P12_BASE64:-}" ]; then
            echo "::warning::SIGNING_CERT_P12_BASE64 absent — build ad-hoc (permission Accessibilité instable entre mises à jour). Voir Tools/make-signing-cert.sh."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/handometer-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "${CERT_PASSWORD:-}" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Rendre le trousseau visible pour `security find-identity` (utilisé par build.sh).
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm -f "$RUNNER_TEMP/cert.p12"
          # Certificat auto-signé « untrusted » → visible via find-identity SANS -v.
          security find-identity | grep "Handometer Self-Signed" || {
            echo "::error::Certificat importé mais identité « Handometer Self-Signed » introuvable."; exit 1; }

      - name: Compiler et assembler le .app
        run: VERSION="${{ steps.version.outputs.version }}" ./build.sh release

      - name: Zipper le bundle
        id: zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="Handometer-${VERSION}.zip"
          ditto -c -k --keepParent "Handometer.app" "$ZIP"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "size=$(stat -f%z "$ZIP")" >> "$GITHUB_OUTPUT"

      - name: Signer la mise à jour (EdDSA Sparkle)
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SIGN_TOOL="$(find .build -type f -name sign_update -not -path '*old_dsa*' | head -1)"
          # sign_update lit la clé privée depuis stdin via --ed-key-file -
          SIG_OUTPUT="$(printf '%s' "$SPARKLE_PRIVATE_KEY" | "$SIGN_TOOL" --ed-key-file - "${{ steps.zip.outputs.zip }}")"
          echo "Signature: $SIG_OUTPUT"
          # Sortie de la forme : sparkle:edSignature="..." length="..."
          ED_SIG="$(echo "$SIG_OUTPUT" | sed -E 's/.*sparkle:edSignature="([^"]+)".*/\1/')"
          echo "edsig=$ED_SIG" >> "$GITHUB_OUTPUT"

      - name: Créer le tag de version
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Créer la GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.zip.outputs.zip }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes

      - name: Mettre à jour l'appcast
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          ZIP: ${{ steps.zip.outputs.zip }}
          SIZE: ${{ steps.zip.outputs.size }}
          EDSIG: ${{ steps.sign.outputs.edsig }}
        run: |
          DL_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ZIP}"
          PUBDATE="$(date -u '+%a, %d %b %Y %H:%M:%S +0000')"
          ITEM=$(cat <<XML
                  <item>
                      <title>${TAG}</title>
                      <pubDate>${PUBDATE}</pubDate>
                      <sparkle:version>${VERSION}</sparkle:version>
                      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                      <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                      <enclosure url="${DL_URL}" length="${SIZE}" type="application/octet-stream" sparkle:edSignature="${EDSIG}" />
                  </item>
          XML
          )
          # Insère le nouvel <item> juste après la balise <language>.
          python3 - "$ITEM" <<'PY'
          import sys, pathlib
          item = sys.argv[1]
          p = pathlib.Path("appcast.xml")
          xml = p.read_text()
          xml = xml.replace("</language>", "</language>\n" + item, 1)
          p.write_text(xml)
          PY

      - name: Commiter l'appcast ([skip ci] pour éviter une boucle)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          # [skip ci] empêche ce commit de re-déclencher le workflow.
          git commit -m "chore: appcast pour ${{ steps.version.outputs.tag }} [skip ci]" || echo "rien à committer"
          git push origin HEAD:main
